<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QR Absensi</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body{
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  min-height: 100vh;
}

/* CONNECTION STATUS */
#connectionStatus{
  position: fixed;
  top: 10px;
  right: 10px;
  font-size: 14px;
  padding: 6px 12px;
  border-radius: 6px;
  background: #222;
  z-index: 1000;
}

.online{ color: lime; }
.offline{ color: red; }

/* MOBILE LAYOUT (default) */
.container {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.scanner-section {
  height: 40vh;
  min-height: 300px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px;
  position: relative;
}

.scanner-section h2 {
  position: absolute;
  top: 50px;
  font-size: 18px;
  z-index: 10;
}

#reader {
  width: 100%;
  max-width: 400px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

#reader video {
  width: 100% !important;
  height: auto !important;
  max-height: 35vh;
  border-radius: 12px;
  object-fit: cover;
}

.info-section {
  flex: 1;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  overflow-y: auto;
}

#status {
  font-size: 16px;
  margin-bottom: 20px;
  text-align: center;
  padding: 0 10px;
}

.ok{ color: lime; }
.error{ color: red; }

#studentCard {
  display: none;
  background: #1b1b1b;
  padding: 20px;
  border-radius: 12px;
  width: 100%;
  max-width: 350px;
  text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

#studentPhoto {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 15px;
  border: 3px solid #333;
}

#studentName {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 5px;
}

#studentClass {
  font-size: 14px;
  color: #ccc;
}

#studentID {
  color: #aaa;
  margin-top: 6px;
  font-size: 12px;
}

#scanTime {
  margin-top: 10px;
  color: lime;
  font-size: 14px;
  font-weight: bold;
}

/* LOADING OVERLAY */
#loadingOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

.loader {
  border: 6px solid #333;
  border-top: 6px solid lime;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* DESKTOP LAYOUT */
@media screen and (min-width: 768px) {
  .container {
    flex-direction: row;
  }
  
  .scanner-section {
    width: 50%;
    height: 100vh;
    border-right: 2px solid #333;
    position: relative;
  }
  
  .scanner-section h2 {
    position: static;
    margin-bottom: 20px;
    font-size: 24px;
  }
  
  #reader {
    max-width: 500px;
    height: auto;
  }
  
  #reader video {
    max-height: 70vh;
  }
  
  .info-section {
    width: 50%;
    height: 100vh;
    justify-content: center;
  }
  
  #status {
    font-size: 20px;
    margin-bottom: 30px;
  }
  
  #studentCard {
    max-width: 400px;
    padding: 30px;
  }
  
  #studentPhoto {
    width: 120px;
    height: 120px;
  }
  
  #studentName {
    font-size: 26px;
  }
  
  #studentClass {
    font-size: 18px;
  }
  
  #studentID {
    font-size: 14px;
  }
}

/* LARGE DESKTOP */
@media screen and (min-width: 1200px) {
  .scanner-section {
    width: 45%;
  }
  
  .info-section {
    width: 55%;
  }
  
  #reader {
    max-width: 600px;
  }
}

/* TOUCH FRIENDLY */
#studentCard {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* PREVENT ZOOM ON INPUTS (iOS) */
@media screen and (max-width: 600px) {
  input, select, textarea {
    font-size: 16px;
  }
}
</style>
</head>
<body>
<div id="connectionStatus">🟢 Online</div>

<div class="container">
  <!-- LEFT/TOP: Scanner -->
  <div class="scanner-section">
    <h2>Scan QR Absensi</h2>
    <div id="reader"></div>
  </div>
  
  <!-- RIGHT/BOTTOM: Student Info -->
  <div class="info-section">
    <div id="status">Menunggu scan...</div>
    
    <div id="studentCard">
      <img id="studentPhoto" src="https://via.placeholder.com/120">
      <div id="studentName">Belum ada scan</div>
      <div id="studentClass"></div>
      <div id="studentID"></div>
      <div id="scanTime"></div>
    </div>
  </div>
</div>

<div id="loadingOverlay">
  <div class="loader"></div>
  <p>Mengirim data...</p>
</div>

<audio id="beepSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzwgwoKQNXSWn7BrwlzZe1XmVlY0JnGgA6CKY7cjVUXols6Oo_7IyBIiuVDmoQh__wO/exec";

let lastScan = 0;
let sendTimer = null;
const statusEl = document.getElementById("status");
const qr = new Html5Qrcode("reader");
let students = {};

/* LOAD STUDENT DATABASE */
async function loadStudents(){
  try {
    const res = await fetch(API_URL + "?action=students");
    const data = await res.json();
    students = data;
  } catch(err) {
    console.error("Failed to load students:", err);
    students = {};
  }
}

/* CONNECTION INDICATOR */
function updateConnection(){
  const el = document.getElementById("connectionStatus");
  let scans = JSON.parse(localStorage.getItem("scanQueue") || "[]");
  if(navigator.onLine){
    el.className = "online";
    el.innerText = "🟢 Online";
  } else {
    el.className = "offline";
    el.innerText = "🔴 Offline (" + scans.length + " data tersimpan)";
  }
}
window.addEventListener("online", updateConnection);
window.addEventListener("offline", updateConnection);

/* START CAMERA */
async function startScanner(){
  try {
    const devices = await Html5Qrcode.getCameras();
    if(!devices || devices.length === 0){
      statusEl.innerText = "No camera found";
      return;
    }
    let cameraId = null;
    for(const cam of devices){
      const name = (cam.label || "").toLowerCase();
      if(name.includes("back") || name.includes("rear") || name.includes("environment")){
        if(!name.includes("wide")){
          cameraId = cam.id;
          break;
        }
      }
    }
    if(!cameraId){
      cameraId = devices[0].id;
    }
    qr.start(cameraId, {fps: 12, qrbox: {width: 250, height: 250}}, onScanSuccess);
  } catch(err) {
    statusEl.innerText = "Camera error: " + err.message;
  }
}

/* DISPLAY STUDENT */
function showStudent(id){
  const s = students[id];
  const time = new Date().toLocaleTimeString();
  document.getElementById("studentCard").style.display = "block";
  document.getElementById("studentID").innerText = "ID: " + id;
  document.getElementById("scanTime").innerText = "Scan: " + time;
  if(!s){
    document.getElementById("studentName").innerText = "Unknown Student";
    document.getElementById("studentClass").innerText = "";
    document.getElementById("studentPhoto").src = "https://via.placeholder.com/120";
    return;
  }
  document.getElementById("studentName").innerText = s.nama;
  document.getElementById("studentClass").innerText = "Kelas " + s.kelas;
  if(s.foto){
    document.getElementById("studentPhoto").src = s.foto;
  }
}

/* SCAN SUCCESS */
function onScanSuccess(decodedText){
  const now = Date.now();
  if(now - lastScan < 2000){
    return;
  }
  lastScan = now;
  
  let scans = JSON.parse(localStorage.getItem("scanQueue") || "[]");
  let exists = scans.some(s => s.id === decodedText);
  
  if(!exists){
    const scanDate = new Date(now);
    const hour = scanDate.getHours();
    let scanType = "PAGI";
    if(hour >= 8 && hour < 13){
      scanType = "EKSTRA";
    }
    
    scans.push({
      id: decodedText,
      type: scanType,
      time: now
    });
    localStorage.setItem("scanQueue", JSON.stringify(scans));
    
    document.getElementById("beepSound").play();
    statusEl.className = "ok";
    statusEl.innerText = "✔ Scan tersimpan: " + decodedText;
    showStudent(decodedText);
    
    clearTimeout(sendTimer);
    sendTimer = setTimeout(sendQueue, 7000);
  } else {
    statusEl.className = "error";
    statusEl.innerText = "Duplicate scan blocked";
  }
  updateConnection();
}

/* SEND QUEUE */
function sendQueue(){
  let scans = JSON.parse(localStorage.getItem("scanQueue") || "[]");
  if(scans.length === 0){
    return;
  }
  
  statusEl.className = "";
  statusEl.innerText = "Mengirim " + scans.length + " data...";
  document.getElementById("loadingOverlay").style.display = "flex";
  
  const encodedData = encodeURIComponent(JSON.stringify(scans));
  fetch(API_URL + "?action=bulkScan&data=" + encodedData)
  .then(r => r.json())
  .then(data => {
    document.getElementById("loadingOverlay").style.display = "none";
    
    if(data.status === "ok"){
      localStorage.removeItem("scanQueue");
      statusEl.className = "ok";
      statusEl.innerText = "✔ " + scans.length + " data terkirim";
    } else {
      statusEl.className = "error";
      statusEl.innerText = "Server error: " + (data.message || "Unknown");
    }
    updateConnection();
  })
  .catch(err => {
    console.log(err);
    document.getElementById("loadingOverlay").style.display = "none";
    statusEl.className = "error";
    statusEl.innerText = "Network error (data tetap tersimpan)";
    updateConnection();
  });
}

/* AUTO SEND ON PAGE LOAD */
window.addEventListener("load", () => {
  updateConnection();
  let scans = JSON.parse(localStorage.getItem("scanQueue") || "[]");
  if(scans.length > 0){
    statusEl.innerText = "Mengirim data tertunda...";
    sendQueue();
  }
});

/* START SYSTEM */
loadStudents().then(startScanner);
</script>
</body>
</html>
